name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão (ex: v0.1.1)'
        required: true
        default: 'v0.1.1'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TagWave ${{ github.ref_name }}'
          releaseBody: |
            ## Como instalar

            **macOS** → baixe o `.dmg`, abra, arraste para Applications.
            Se aparecer aviso de segurança: clique com botão direito → Abrir → Abrir.

            **Windows** → baixe o `_x64-setup.exe`, instale.
            Se aparecer SmartScreen: "Mais informações" → "Executar assim mesmo".

            ---
            Esta é uma versão de teste. Reporte problemas em Issues.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
